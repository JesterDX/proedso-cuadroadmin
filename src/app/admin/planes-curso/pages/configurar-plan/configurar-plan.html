<div *ngIf="plan">

  <h3>
    {{plan.nombre}}
  </h3>


  <p>
    Código:
    {{plan.codigo}}
  </p>


  <p>
    Tipo:
    {{plan.tipo_curso_nombre}}
  </p>


  <p>
    Versión:
    {{plan.version}}
  </p>


  <hr>

<h3>Máquinas del plan</h3>

<div *ngFor="let maquina of maquinas">

  <label>

    <input
      type="checkbox"
      [(ngModel)]="maquina.seleccionada">

    {{ maquina.nombre }}

  </label>

</div>


</div>
