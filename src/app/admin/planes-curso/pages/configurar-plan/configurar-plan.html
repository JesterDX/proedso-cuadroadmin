<div class="plan-container">

  <div class="plan-card">

    <div class="plan-header">

      <div class="plan-title">
        <h2>{{ plan.nombre }}</h2>
        <span>{{ plan.codigo }}</span>
      </div>

      <div class="version">
        v{{ plan.version }}
      </div>

    </div>

    <div class="resume-grid">

      <div class="resume-card">
        <span class="label">Tipo</span>
        <span class="value">{{ plan.tipo_curso_nombre }}</span>
      </div>

      <div class="resume-card">
        <span class="label">Máquinas</span>
        <span class="value">{{ maquinas.length }}</span>
      </div>

      <div class="resume-card">
        <span class="label">Vigencia</span>
        <span class="value">{{ plan.vigente_desde }}</span>
      </div>

    </div>

  </div>

  <h3 class="section-title">
    Máquinas del plan
  </h3>

  <div class="machine-grid">

    <div
      class="machine-card"
      *ngFor="let m of maquinas">

      <div class="machine-icon">
        🚜
      </div>

      <div class="machine-info">

        <div class="machine-name">
          {{ m.nombre }}
        </div>
        
        <div class="machine-hours">
          {{ m.horas }} horas
        </div>

      </div>

    </div>

  </div>

</div>
