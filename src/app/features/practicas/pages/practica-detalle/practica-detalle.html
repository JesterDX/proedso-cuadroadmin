<div *ngFor="let item of sesion.detalle" class="detalle-card">

    <h4>{{ item.alumno }}</h4>

    <p>
        <strong>Máquina:</strong>
        {{ item.maquina }}
    </p>

    <div class="campo">

        <label>Asistencia</label>

        <select [(ngModel)]="item.asistencia">

            <option value="">Seleccione...</option>

            <option value="ASISTIO">✅ Asistió</option>

            <option value="FALTO">❌ Faltó</option>

            <option value="JUSTIFICADO">🟡 Justificado</option>

        </select>

    </div>

    <div class="campo">

        <label>Observaciones</label>

        <textarea
            rows="3"
            [(ngModel)]="item.observaciones"
            placeholder="Ingrese observaciones">
        </textarea>

    </div>

    <div class="campo">

        <label>Evidencia</label>

        <input
            type="file"
            accept="image/*"
            (change)="seleccionarImagen($event,item)">

        <div *ngIf="item.evidencia_url">

            <img
                [src]="item.evidencia_url"
                width="180">

        </div>

    </div>

    <hr>

</div>

<div class="acciones">

    <button (click)="guardarSesion()">

        💾 Guardar

    </button>

</div>
